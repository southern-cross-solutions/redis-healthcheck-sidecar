version: '3'

# Global variables used across tasks
vars:
  BINARY_NAME: redis-healthcheck-sidecar
  BUILD_DIR: bin
  DOCKER_REGISTRY: repo.ops.sc-solutions.co.za/sandbox-oci
  DOCKER_IMAGE: "{{.DOCKER_REGISTRY}}/{{.BINARY_NAME}}"
  VERSION: 
    sh: git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0"

# Environmental variables loaded for tasks
env:
  GO111MODULE: "on"
  CGO_ENABLED: "0"

tasks:

  default:
    desc: Lists available tasks
    cmds:
      - task --list

  init:
    desc: Initialize project dependencies
    cmds:
      - go mod download
      - go mod tidy

  format:
    desc: Format all Go source files safely
    cmds:
      - go fmt ./...

  lint:
    desc: Run strict golangci-lint checks
    deps: [format]
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run unit tests with race detection and coverage mapping
    env:
      CGO_ENABLED: "1" # Required for race detector
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...

  clean:
    desc: Clean up build artifacts and caches
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - go clean -testcache

  build:
    desc: Build the production binary for the host OS
    deps: [clean, format]
    cmds:
      - |
        go build -ldflags="-w -s -X main.Version={{.VERSION}}" \
        -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./main.go
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  compile-linux:
    desc: Cross-compile binary strictly for Linux environments
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - |
        go build -ldflags="-w -s -X main.Version={{.VERSION}}" \
        -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 ./main.go

  docker:build:
    desc: Build production-ready Docker image
    deps: [compile-linux]
    cmds:
      - docker build --build-arg BINARY_PATH={{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 -t {{.DOCKER_IMAGE}}:{{.VERSION}} .
      - docker tag {{.DOCKER_IMAGE}}:{{.VERSION}} {{.DOCKER_IMAGE}}:latest

  docker:push:
    desc: Push tagged images to remote container registry
    deps: [docker:build]
    cmds:
      - docker push {{.DOCKER_IMAGE}}:{{.VERSION}}
      - docker push {{.DOCKER_IMAGE}}:latest

  dev:
    desc: Run the app locally
    cmds:
      - ./redis-healthcheck-sidecar

