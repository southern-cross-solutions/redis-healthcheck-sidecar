version: '3'

# Global variables used across tasks
vars:
  BINARY_NAME: redis-healthcheck-sidecar
  BUILD_DIR: bin
  DOCKER_REGISTRY: repo.ops.sc-solutions.co.za/sandbox-oci
  DOCKER_IMAGE: "{{.DOCKER_REGISTRY}}/{{.BINARY_NAME}}"
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0"
  TEST_BIN: ./bin/redis-healthcheck-sidecar
  TEST_CONFIG_FILE: ./bin/test/test-config.json

# Environmental variables loaded for tasks
env:
  GO111MODULE: "on"
  CGO_ENABLED: "0"

tasks:

  default:
    desc: Lists available tasks
    cmds:
      - task --list

  init:
    desc: Initialize project dependencies
    cmds:
      - go mod download
      - go mod tidy

  format:
    desc: Format all Go source files safely
    cmds:
      - go fmt ./...

  lint:
    desc: Run strict golangci-lint checks
    deps: [format]
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run Unit and Acceptance tests
    deps:
      - task: test:unit
      - task: test:acceptance
    silent: true
    cmds:
      - echo "======================================================="
      - echo " Running Unit and Acceptance Tests                     "
      - echo "======================================================="

  test:unit:
    desc: Run unit tests with race detection and coverage mapping
    env:
      CGO_ENABLED: "1"  # Required for race detector

    cmds:
      - go test -v -race -coverprofile=coverage.out ./...

  test:acceptance:
    desc: Run full end-to-end acceptance suite with dynamic lifecycle cleanup
    deps:
      - task: test:acceptance:build
      - task: test:acceptance:prepare-test-dir
      - task: test:acceptance:infra-up
    silent: true
    # Clean up everything at the very end, even if assertion steps fail midway
    cmds:
      - defer: { task: test:acceptance:cleanup }
      - echo "======================================================="
      - echo " Starting Redis HealthCheck Sidecar Acceptance Testing "
      - echo "======================================================="
      - task: test:acceptance:scenario-master
      - task: test:acceptance:scenario-replica
      - echo "===================================================="
      - echo " ALL ACCEPTANCE TESTS PASSED SUCCESSFULLY!          "
      - echo "===================================================="

  test:acceptance:build:
    internal: true
    deps:
      - task: build
    cmds:
      - echo "Building before running Acceptance tests..."
    silent: true

  test:acceptance:prepare-test-dir:
    cmds:
      - mkdir ./bin/test
    status:
      - test -d ./bin/test

  test:acceptance:infra-up:
    internal: true
    desc: Provisions isolated test Redis topology
    status:
      - docker ps -f name=test-redis-master -f name=test-redis-replica | grep -q "test-redis"
    cmds:
      - cmd: echo "Launching local Test Redis Architecture..."
        silent: true
      - docker run -d --name test-redis-master -p 63791:6379 redis:7-alpine redis-server --requirepass 123456
      - docker run -d --name test-redis-replica -p 63792:6379 redis:7-alpine redis-server --requirepass 123456 --replicaof 172.17.0.1 63791
      - sleep 3

  test:acceptance:scenario-master:
    internal: true
    deps:
      - task: test:acceptance:prepare-test-dir
    silent: true
    cmds:
      - defer: kill $(pkill -f "{{.TEST_BIN}}") 2>/dev/null || true
      - echo '{"redis_address":"127.0.0.1:63791","redis_password":"123456","http_port":8081}' > {{.TEST_CONFIG_FILE}}
      # Run in background via Taskfile native & tracking
      - "{{.TEST_BIN}} -config {{.TEST_CONFIG_FILE}} &"
      - sleep 1
      - echo "Verifying Master status (Expecting 200 OK)..."
      # Perform HTTP evaluation and assertion
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/master || echo "Failed")
        if [ "$STATUS" != "200" ]; then
          echo "❌ Failed: Master returned status $STATUS" && exit 1
        fi
        echo "✔ Success: Master healthcheck returned 200 OK!"

  test:acceptance:scenario-replica:
    internal: true
    deps:
      - task: test:acceptance:prepare-test-dir
    silent: true
    cmds:
      - defer: kill $(pkill -f "{{.TEST_BIN}}") 2>/dev/null || true
      - echo '{"redis_address":"127.0.0.1:63792","redis_password":"123456","http_port":8082}' > {{.TEST_CONFIG_FILE}}
      - "{{.TEST_BIN}} -config {{.TEST_CONFIG_FILE}} &"
      - sleep 1
      - echo "Verifying Replica status (Expecting 503 Service Unavailable)..."
      - |
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/master || echo "Failed")
        if [ "$STATUS" != "503" ]; then
          echo "❌ Failed: Replica returned status $STATUS instead of 503" && exit 1
        fi
        echo "✔ Success: Replica sidecar healthcheck appropriately rejected via 503!"
    

  test:acceptance:cleanup:
    desc: Teardown test configuration files and running container infrastructure
    always: true
    cmds:
      - cmd: echo "Cleaning up environments..."
        silent: true
      - docker stop test-redis-master test-redis-replica 2>/dev/null || true
      - docker rm test-redis-master test-redis-replica 2>/dev/null || true
      - rm -f {{.CONFIG_FILE}}

  clean:
    desc: Clean up build artifacts and caches
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - go clean -testcache

  build:
    desc: Build the production binary for the host OS
    deps: [clean, format]
    cmds:
      - |
        go build -ldflags="-w -s -X main.Version={{.VERSION}}" \
        -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./main.go
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  compile-linux:
    desc: Cross-compile binary strictly for Linux environments
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - |
        go build -ldflags="-w -s -X main.Version={{.VERSION}}" \
        -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 ./main.go

  dev:
    desc: Run the app locally
    cmds:
      - ./bin/redis-healthcheck-sidecar

  package:debian:
    desc: Build a Ubuntu DEB package
    cmds:
      - dpkg-buildpackage -us -uc -b
